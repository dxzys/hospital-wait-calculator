<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset = "UTF-8">
    <meta name = "viewport" content=" = "width=device-width, initial-scale=1.0">
    <title>ER tracker Skeletion</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; }
        #map { height: 100%; width: 100%; }  /*full screen*/
    </style>
</head>
<body>


        <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // INSTATIATE MAP
        const map = L.map('map').setView([45.273, -66.063], 13);

        // OPEN STREETMAP
       L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // MAKE POINT RED
    const redIcon = new L.Icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
        shadowSize: [41, 41]
});

const hospitalMarker = L.marker([45.305, -66.084], {icon: redIcon}).addTo(map);
hospitalMarker.bindPopup("<b>Saint John Regional Hospital</b><br>Wait time Loading....").openPopup();

    </script>
</body>
</html>
