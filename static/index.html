<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset = "UTF-8">
    <meta name = "viewport" content=" = "width=device-width, initial-scale=1.0">
    <title>ER tracker Skeletion</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; }
        #map { height: 100%; width: 100%; }  /*full screen*/
    </style>
</head>
<body>


        <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // INSTATIATE MAP
        const map = L.map('map').setView([45.273, -66.063], 13);

        // LOAD
       L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // MAKE POINT
        hospitalMarker = L.marker([45.305, -66.084]).addTo(map);
        hospitalMarker.bindPopup("<b>Saint John Regional Hconstospital</b><br>Wait time Loading....").openPopup();
    </script>
</body>
</html>
